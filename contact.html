</head>

<body>

<!-- ===== HEADER START ===== -->
<header class="main-header">

    <!-- Container (helps layout) -->

        <!-- Logo -->
        <div class="logo">
            <h1>
                <a href="index.html">
                    <span>Garaad</span> School
                </a>
            </h1>
        </div>

        <!-- Navigation -->
        <nav class="navbar">
            <ul class="main-menu">

                <li><a href="index.html">Home</a></li>

                <li class="has-dropdown">
                    <a href="about.html">About Us</a>
                    <ul class="dropdown">
                        <li><a href="about.html#mission">Mission</a></li>
                        <li><a href="about.html#vision">Vision</a></li>

                <li><a href="contact.html">Contact</a></li>
                <li><a href="signin.html">Sign In</a></li>

            </ul>

        <!-- Right Side (extras) -->

            <!-- Search -->
            <div class="search-box">

            <a href="#" class="btn">Apply Now</a>

</header>
<!-- ===== HEADER END ===== -->

<!-- contact -->
 <section class="contact">
    <div class="contact-wrapper">
        <div class="box">
            <h2>School Address</h2>
            <p>  <span class="p-strong">Location:</span> Mogadishu, Somalia</p>
            <p><span class="p-strong">Phone:</span> +252 61 8875918</p>
            <p> <span class="p-strong">Email:</span> info@garaadschool.com</p>
            <p>Sunday - Thursday: 7:00 AM - 12:30 AM</p>
        </div>

        <div class="box">
            <h2>send messege</h2>

            <form action="#">
                <input type="text" name="name" id="name" placeholder="full name" required>
                <input type="email" name="email" id="email" placeholder="email address">
                <input type="text" name="subject" id="subject" placeholder="subject" required>
                <textarea name="messege" id="messege" rows="5" placeholder="send messege now..." required></textarea>
                <button type="submit" class="btn">send messege now...</button>
            </form>
        </div>

    </div>
    <!-- map -->
    <div class="flex">
    <div class="map">
        <h2>Our Location</h2>
        <iframe src="https://www.google.com/maps?q=Mogadishu,Somalia&output=embed"></iframe>
    </div>
    </div>

 </section>

 <!-- footer -->
  
</body>
</html>
