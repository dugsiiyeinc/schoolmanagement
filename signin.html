<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600,700" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="signin.css">

    <title>Garaad School Management System</title>
</head>

<body>

<!-- ===== HEADER START ===== -->
<header class="main-header">

    <!-- Container (helps layout) -->
    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <h1>
                <a href="index.html">
                    <span>Garaad</span> School
                </a>
            </h1>
        </div>

        <!-- Navigation -->
        <nav class="navbar">
            <ul class="main-menu">

                <li><a href="index.html">Home</a></li>

                <li class="has-dropdown">
                    <a href="about.html">About Us</a>
                    <ul class="dropdown">
                        <li><a href="about.html#mission">Mission</a></li>
                        <li><a href="about.html#vision">Vision</a></li>
                        <li><a href="about.html#values">Values</a></li>
                    </ul>
                </li>

                <li><a href="contact.html">Contact</a></li>
                <li><a href="signin.html">Sign In</a></li>

            </ul>
        </nav>

        <!-- Right Side (extras) -->
        <div class="header-right">

            <!-- Search -->
            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>

            <!-- Button -->
            <a href="#" class="btn">Apply Now</a>

            <!-- Mobile Menu Icon -->
            <div class="menu-toggle">
                ☰
            </div>

        </div>

    </div>

</header>
<!-- ===== HEADER END ===== -->

<!-- sign in -->
<section class="sign-container">
    <div class="sign-box">
        <h2>School Management</h2>
        <p>Create your account</p>

        <form>
            <div class="sign-input">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="sign-input">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="sign-input">
                <label>Password</label>
                <input type="password" placeholder="Enter password" required>
            </div>

            <div class="sign-input">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm password" required>
            </div>

            <div class="sign-input">
                <label>Select Role</label>
                <select required>
                    <option value="">Choose role</option>
                    <option>Student</option>
                    <option>Teacher</option>
                    <option>Admin</option>
                </select>
            </div>

            <button type="submit" class="btn">Sign Up</button>

            <p class="login-link">
                Already have an account? <a href="#">Login</a>
            </p>
        </form>
    </div>
</section>

<!-- footer -->


</body>
</html>
